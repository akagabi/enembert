name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow one concurrent deployment, and let a newer push supersede a running one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install
        working-directory: demo
        run: npm ci

      - name: Build
        working-directory: demo
        run: npm run build

      - name: Guard — no bundled weights, no third-party hosts
        working-directory: demo
        run: |
          # The demo streams model weights from the Hub; a stray local model
          # directory would mean shipping ~500MB and, worse, that someone
          # committed corpus data.
          if [ -d dist/models ]; then
            echo "::error::dist/models exists — weights must be streamed from Hugging Face, not bundled"
            exit 1
          fi

          # The page claims nothing leaves the browser except the model download.
          # These two files must be served by us: without them onnxruntime-web
          # silently fetches its runtime from cdn.jsdelivr.net, and self-hosted
          # fonts are the whole reason we stopped using Google Fonts. A missing
          # file here degrades to a third-party request that nothing else catches.
          for f in ort/ort-wasm-simd-threaded.asyncify.wasm \
                   ort/ort-wasm-simd-threaded.asyncify.mjs \
                   fonts/karla-latin.woff2 \
                   fonts/fraunces-latin.woff2; do
            if [ ! -f "dist/$f" ]; then
              echo "::error::dist/$f missing — the page would fall back to a third-party CDN"
              exit 1
            fi
          done

          # No third-party host may appear in the shipped HTML or CSS. (The JS
          # bundle legitimately contains a jsdelivr string as an unreached
          # fallback, so it is excluded here and covered by the file check above.)
          if grep -rqE "https://(fonts\.googleapis|fonts\.gstatic|cdn\.jsdelivr)" dist/index.html dist/assets/*.css; then
            echo "::error::a third-party host is referenced in the shipped HTML/CSS"
            grep -roE "https://(fonts\.googleapis|fonts\.gstatic|cdn\.jsdelivr)[^\"')]*" dist/index.html dist/assets/*.css
            exit 1
          fi

          size=$(du -sm dist | cut -f1)
          echo "dist is ${size} MB"
          if [ "$size" -gt 40 ]; then
            echo "::error::dist is ${size} MB — expected ~23 MB; is a weight or duplicate wasm being shipped?"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
