name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow one concurrent deployment, and let a newer push supersede a running one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install
        working-directory: demo
        run: npm ci

      - name: Build
        working-directory: demo
        run: npm run build

      - name: Guard — the bundle must not contain essay text or model weights
        working-directory: demo
        run: |
          # The demo streams weights from the Hub; a stray local model directory
          # would mean shipping ~100MB and, worse, that someone committed data.
          if [ -d dist/models ]; then
            echo "::error::dist/models exists — weights must be streamed from Hugging Face, not bundled"
            exit 1
          fi
          size=$(du -sm dist | cut -f1)
          echo "dist is ${size} MB"
          if [ "$size" -gt 60 ]; then
            echo "::error::dist is ${size} MB, which is far larger than expected for a weight-free build"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
